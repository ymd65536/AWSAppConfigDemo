AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Step 1, Step 2, Step 3, and Step 4 - AWS AppConfig, S3, Glue, Athena, and Bedrock-style Lambda demo

Parameters:
  BedrockModelId:
    Type: String
    Default: anthropic.claude-3-haiku-20240307-v1:0
    Description: Bedrock model identifier used by Step4

Resources:
  AppConfigApplication:
    Type: AWS::AppConfig::Application
    Properties:
      Name: appconfig-demo-app
      Description: Demo application for AppConfig integration

  AppConfigEnvironment:
    Type: AWS::AppConfig::Environment
    Properties:
      ApplicationId: !Ref AppConfigApplication
      Name: dev
      Description: Development environment for AppConfig demo

  AppConfigConfigurationProfile:
    Type: AWS::AppConfig::ConfigurationProfile
    Properties:
      ApplicationId: !Ref AppConfigApplication
      Name: lambda-settings
      LocationUri: hosted
      Type: AWS.Freeform

  AppConfigHostedConfigurationVersion:
    Type: AWS::AppConfig::HostedConfigurationVersion
    Properties:
      ApplicationId: !Ref AppConfigApplication
      ConfigurationProfileId: !Ref AppConfigConfigurationProfile
      Description: Initial hosted configuration for the demo Lambda
      ContentType: application/json
      Content: |
        [
          {
            "model_id": "sales_performance",
            "display_name": "売上・業績分析モデル",
            "description": "店舗別の売上合計、商品カテゴリ別の売れ行き、月次・日次の売上トレンド（いくら売れたか）を分析する文脈。売上金額（amount）の集計を伴う質問はすべてこのモデルが担当する。",
            "target_table": "sales_summary",
            "sample_queries": [
              "先月の店舗ごとの売上を教えて",
              "カテゴリ別の売上ランキングが知りたい"
            ]
          },
          {
            "model_id": "customer_demographics",
            "display_name": "顧客属性・会員分析モデル",
            "description": "会員の年齢層、性別、会員ランクの分布、アクティブユーザー数（何人いるか）を分析する文脈。顧客の『人数』や『属性の割合』に関する質問を担当する。※売上金額は含まない。",
            "target_table": "customer_master",
            "sample_queries": [
              "現在のアクティブ会員の男女比は？",
              "20代の会員は何人登録されている？"
            ]
          }
        ]

  AppConfigDeploymentStrategy:
    Type: AWS::AppConfig::DeploymentStrategy
    Properties:
      Name: appconfig-demo-strategy
      DeploymentDurationInMinutes: 0
      FinalBakeTimeInMinutes: 0
      GrowthFactor: 100
      ReplicateTo: NONE
      Description: Deploy configuration immediately for the demo

  AppConfigDeployment:
    Type: AWS::AppConfig::Deployment
    Properties:
      ApplicationId: !Ref AppConfigApplication
      EnvironmentId: !Ref AppConfigEnvironment
      ConfigurationProfileId: !Ref AppConfigConfigurationProfile
      ConfigurationVersion: !GetAtt AppConfigHostedConfigurationVersion.VersionNumber
      DeploymentStrategyId: !Ref AppConfigDeploymentStrategy
      Description: Deploy the initial hosted configuration

  AppConfigLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: AppConfigDataAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - appconfig:StartConfigurationSession
                  - appconfig:GetLatestConfiguration
                  - appconfigdata:StartConfigurationSession
                  - appconfigdata:GetLatestConfiguration
                Resource: '*'
              - Effect: Allow
                Action:
                  - lambda:GetLayerVersion
                Resource: '*'

  Step2LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: Step2DataAndQueryAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:HeadBucket
                  - s3:ListBucket
                  - s3:GetBucketLocation
                  - s3:PutObject
                  - s3:GetObject
                Resource:
                  - !Sub arn:aws:s3:::${DataBucket}
                  - !Sub arn:aws:s3:::${DataBucket}/*
              - Effect: Allow
                Action:
                  - glue:CreateDatabase
                  - glue:GetDatabase
                  - glue:CreateTable
                  - glue:GetTable
                  - glue:GetTables
                Resource: '*'
              - Effect: Allow
                Action:
                  - athena:StartQueryExecution
                  - athena:GetQueryExecution
                  - athena:GetQueryResults
                Resource: '*'

  DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub appconfig-demo-data-${AWS::AccountId}-${AWS::Region}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  AppConfigReaderFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: app.app.lambda_handler
      AutoPublishAlias: live
      Runtime: python3.11
      Timeout: 30
      Role: !GetAtt AppConfigLambdaExecutionRole.Arn
      Environment:
        Variables:
          AWS_APPCONFIG_APPLICATION_ID: !Ref AppConfigApplication
          AWS_APPCONFIG_ENVIRONMENT_ID: !Ref AppConfigEnvironment
          AWS_APPCONFIG_CONFIGURATION_PROFILE_ID: !Ref AppConfigConfigurationProfile
          AWS_APPCONFIG_EXTENSION_HTTP_PORT: "2772"

  Step2DataPreparationFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: app.step2_data_prep.lambda_handler
      Runtime: python3.11
      Timeout: 60
      Role: !GetAtt Step2LambdaExecutionRole.Arn
      Environment:
        Variables:
          S3_BUCKET_NAME: !Ref DataBucket
          GLUE_DATABASE_NAME: appconfig_demo

  Step2AthenaQueryFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: app.step2_athena.lambda_handler
      Runtime: python3.11
      Timeout: 60
      Role: !GetAtt Step2LambdaExecutionRole.Arn
      Environment:
        Variables:
          ATHENA_OUTPUT_S3_URI: !Sub s3://${DataBucket}/athena-results
          ATHENA_WORKGROUP: primary

  Step3BedrockFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: app.step3_bedrock.lambda_handler
      Runtime: python3.11
      Timeout: 60
      Role: !GetAtt AppConfigLambdaExecutionRole.Arn
      Environment:
        Variables:
          AWS_APPCONFIG_APPLICATION_ID: !Ref AppConfigApplication
          AWS_APPCONFIG_ENVIRONMENT_ID: !Ref AppConfigEnvironment
          AWS_APPCONFIG_CONFIGURATION_PROFILE_ID: !Ref AppConfigConfigurationProfile
          AWS_APPCONFIG_EXTENSION_HTTP_PORT: "2772"

  Step4BedrockFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: run.sh
      Runtime: python3.11
      Timeout: 60
      MemorySize: 256
      Role: !GetAtt AppConfigLambdaExecutionRole.Arn
      Environment:
        Variables:
          AWS_APPCONFIG_APPLICATION_ID: !Ref AppConfigApplication
          AWS_APPCONFIG_ENVIRONMENT_ID: !Ref AppConfigEnvironment
          AWS_APPCONFIG_CONFIGURATION_PROFILE_ID: !Ref AppConfigConfigurationProfile
          AWS_APPCONFIG_EXTENSION_HTTP_PORT: "2772"
          BEDROCK_MODEL_ID: !Ref BedrockModelId
          AWS_LAMBDA_EXEC_WRAPPER: /opt/bootstrap
          PORT: 8080
      Layers:
        - !Sub arn:aws:lambda:${AWS::Region}:753240598075:layer:LambdaAdapterLayerX86:28
      Events:
        HttpApi:
          Type: HttpApi
          Properties:
            Path: /{proxy+}
            Method: ANY

  Step4FunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      AuthType: NONE
      TargetFunctionArn: !GetAtt Step4BedrockFunction.Arn
      Cors:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
          - POST
        AllowHeaders:
          - content-type

  Step4FunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunctionUrl
      FunctionName: !GetAtt Step4BedrockFunction.Arn
      Principal: "*"
      FunctionUrlAuthType: NONE

Outputs:
  AppConfigReaderFunctionName:
    Value: !Ref AppConfigReaderFunction
  AppConfigApplicationId:
    Value: !Ref AppConfigApplication
  AppConfigEnvironmentId:
    Value: !Ref AppConfigEnvironment
  AppConfigConfigurationProfileId:
    Value: !Ref AppConfigConfigurationProfile
  DataBucketName:
    Value: !Ref DataBucket
  Step2DataPreparationFunctionName:
    Value: !Ref Step2DataPreparationFunction
  Step2AthenaQueryFunctionName:
    Value: !Ref Step2AthenaQueryFunction
  Step3BedrockFunctionName:
    Value: !Ref Step3BedrockFunction
  Step4BedrockFunctionName:
    Value: !Ref Step4BedrockFunction
  Step4FunctionUrl:
    Value: !GetAtt Step4FunctionUrl.FunctionUrl
