AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Step 1 and Step 2 - AWS AppConfig, S3, Glue, and Athena demo
Resources:
  AppConfigApplication:
    Type: AWS::AppConfig::Application
    Properties:
      Name: appconfig-demo-app
      Description: Demo application for AppConfig integration
  AppConfigEnvironment:
    Type: AWS::AppConfig::Environment
    Properties:
      ApplicationId:
        Ref: AppConfigApplication
      Name: dev
      Description: Development environment for AppConfig demo
  AppConfigConfigurationProfile:
    Type: AWS::AppConfig::ConfigurationProfile
    Properties:
      ApplicationId:
        Ref: AppConfigApplication
      Name: lambda-settings
      LocationUri: hosted
      Type: AWS.Freeform
  AppConfigHostedConfigurationVersion:
    Type: AWS::AppConfig::HostedConfigurationVersion
    Properties:
      ApplicationId:
        Ref: AppConfigApplication
      ConfigurationProfileId:
        Ref: AppConfigConfigurationProfile
      Description: Initial hosted configuration for the demo Lambda
      ContentType: application/json
      Content: "{\n  \"message\": \"Hello from AWS AppConfig\",\n  \"feature_enabled\"\
        : true,\n  \"source\": \"appconfig\"\n}\n"
  AppConfigDeploymentStrategy:
    Type: AWS::AppConfig::DeploymentStrategy
    Properties:
      Name: appconfig-demo-strategy
      DeploymentDurationInMinutes: 0
      FinalBakeTimeInMinutes: 0
      GrowthFactor: 100
      ReplicateTo: NONE
      Description: Deploy configuration immediately for the demo
  AppConfigDeployment:
    Type: AWS::AppConfig::Deployment
    Properties:
      ApplicationId:
        Ref: AppConfigApplication
      EnvironmentId:
        Ref: AppConfigEnvironment
      ConfigurationProfileId:
        Ref: AppConfigConfigurationProfile
      ConfigurationVersion:
        Fn::GetAtt:
        - AppConfigHostedConfigurationVersion
        - VersionNumber
      DeploymentStrategyId:
        Ref: AppConfigDeploymentStrategy
      Description: Deploy the initial hosted configuration
  AppConfigLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: lambda.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
      - PolicyName: AppConfigDataAccess
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - appconfig:StartConfigurationSession
            - appconfig:GetLatestConfiguration
            - appconfigdata:StartConfigurationSession
            - appconfigdata:GetLatestConfiguration
            Resource: '*'
  Step2LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: lambda.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
      - PolicyName: Step2DataAndQueryAccess
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - s3:CreateBucket
            - s3:HeadBucket
            - s3:ListBucket
            - s3:GetBucketLocation
            - s3:PutObject
            - s3:GetObject
            Resource:
            - Fn::Sub: arn:aws:s3:::${DataBucket}
            - Fn::Sub: arn:aws:s3:::${DataBucket}/*
          - Effect: Allow
            Action:
            - glue:CreateDatabase
            - glue:GetDatabase
            - glue:CreateTable
            - glue:GetTable
            - glue:GetTables
            Resource: '*'
          - Effect: Allow
            Action:
            - athena:StartQueryExecution
            - athena:GetQueryExecution
            - athena:GetQueryResults
            Resource: '*'
  DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName:
        Fn::Sub: appconfig-demo-data-${AWS::AccountId}-${AWS::Region}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
        - ServerSideEncryptionByDefault:
            SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
  AppConfigReaderFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: AppConfigReaderFunction
      Handler: app.app.lambda_handler
      AutoPublishAlias: live
      Runtime: python3.11
      Timeout: 30
      Role:
        Fn::GetAtt:
        - AppConfigLambdaExecutionRole
        - Arn
      Environment:
        Variables:
          AWS_APPCONFIG_APPLICATION_ID:
            Ref: AppConfigApplication
          AWS_APPCONFIG_ENVIRONMENT_ID:
            Ref: AppConfigEnvironment
          AWS_APPCONFIG_CONFIGURATION_PROFILE_ID:
            Ref: AppConfigConfigurationProfile
          AWS_APPCONFIG_EXTENSION_HTTP_PORT: '2772'
    Metadata:
      SamResourceId: AppConfigReaderFunction
  Step2DataPreparationFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: Step2DataPreparationFunction
      Handler: app.step2_data_prep.lambda_handler
      Runtime: python3.11
      Timeout: 60
      Role:
        Fn::GetAtt:
        - Step2LambdaExecutionRole
        - Arn
      Environment:
        Variables:
          S3_BUCKET_NAME:
            Ref: DataBucket
          GLUE_DATABASE_NAME: appconfig_demo
    Metadata:
      SamResourceId: Step2DataPreparationFunction
  Step2AthenaQueryFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: Step2AthenaQueryFunction
      Handler: app.step2_athena.lambda_handler
      Runtime: python3.11
      Timeout: 60
      Role:
        Fn::GetAtt:
        - Step2LambdaExecutionRole
        - Arn
      Environment:
        Variables:
          ATHENA_OUTPUT_S3_URI:
            Fn::Sub: s3://${DataBucket}/athena-results
          ATHENA_WORKGROUP: primary
    Metadata:
      SamResourceId: Step2AthenaQueryFunction
Outputs:
  AppConfigReaderFunctionName:
    Value:
      Ref: AppConfigReaderFunction
  AppConfigApplicationId:
    Value:
      Ref: AppConfigApplication
  AppConfigEnvironmentId:
    Value:
      Ref: AppConfigEnvironment
  AppConfigConfigurationProfileId:
    Value:
      Ref: AppConfigConfigurationProfile
  DataBucketName:
    Value:
      Ref: DataBucket
  Step2DataPreparationFunctionName:
    Value:
      Ref: Step2DataPreparationFunction
  Step2AthenaQueryFunctionName:
    Value:
      Ref: Step2AthenaQueryFunction
